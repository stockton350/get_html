<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML File Downloader</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #374151;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-dark: #0284c7;
      --danger: #f87171;
      --border: #4b5563;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      margin-bottom: 16px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(31, 41, 55, 0.9);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input {
      padding: 12px 14px;
    }

    textarea {
      min-height: 560px;
      padding: 16px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #001018;
      background: var(--accent);
      transition: transform 0.12s ease, background 0.12s ease;
      white-space: nowrap;
    }

    button:hover {
      background: #7dd3fc;
      transform: translateY(-1px);
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #4b5563;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: rgba(17, 24, 39, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }

    .hint {
      color: var(--muted);
      font-size: 0.86rem;
    }

    iframe {
      width: 100%;
      height: 560px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .controls,
      .workspace {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      textarea,
      iframe {
        min-height: 420px;
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>HTML File Downloader</h1>
      <p>Paste HTML into the editor, preview it instantly, then download it as a standalone <code>.html</code> file.</p>
    </header>

    <section class="controls" aria-label="Download controls">
      <div>
        <label for="filename">File name</label>
        <input id="filename" type="text" value="my-page.html" placeholder="my-page.html" />
      </div>
      <button id="downloadBtn" type="button">Download HTML</button>
      <button id="clearBtn" class="secondary" type="button">Clear</button>
    </section>

    <section class="workspace">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Paste your HTML</div>
          <div class="hint" id="charCount">0 characters</div>
        </div>
        <textarea id="htmlInput" spellcheck="false"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My HTML Page</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Hello, world!</h1>
  <p>Paste your own HTML here, then download it as a file.</p>
</body>
</html></textarea>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Live preview</div>
          <div class="hint">Updates as you type</div>
        </div>
        <iframe id="preview" title="HTML preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
      </div>
    </section>

    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    const htmlInput = document.getElementById('htmlInput');
    const filenameInput = document.getElementById('filename');
    const preview = document.getElementById('preview');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');
    const charCount = document.getElementById('charCount');

    function normalizeFilename(name) {
      let safeName = name.trim() || 'download.html';
      safeName = safeName.replace(/[\\/:*?"<>|]/g, '-');
      if (!safeName.toLowerCase().endsWith('.html') && !safeName.toLowerCase().endsWith('.htm')) {
        safeName += '.html';
      }
      return safeName;
    }

    function updatePreview() {
      const html = htmlInput.value;
      preview.srcdoc = html;
      charCount.textContent = `${html.length.toLocaleString()} character${html.length === 1 ? '' : 's'}`;
      status.textContent = '';
      status.className = 'status';
    }

    function downloadHtml() {
      const html = htmlInput.value;
      if (!html.trim()) {
        status.textContent = 'Paste some HTML before downloading.';
        status.className = 'status error';
        return;
      }

      const filename = normalizeFilename(filenameInput.value);
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);

      status.textContent = `Downloaded ${filename}.`;
      status.className = 'status';
    }

    function clearEditor() {
      htmlInput.value = '';
      updatePreview();
      status.textContent = 'Editor cleared.';
    }

    htmlInput.addEventListener('input', updatePreview);
    downloadBtn.addEventListener('click', downloadHtml);
    clearBtn.addEventListener('click', clearEditor);

    updatePreview();
  </script>
</body>
</html>
